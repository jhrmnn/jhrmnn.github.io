# The homepage spine: tool-hubs, each a dense narrative paragraph (blurb, with
# inline links to the pieces it ties together) followed by its publications. Pubs
# are referenced by citation key — the same ids as data/extras.yaml and
# build/derived.json (the trailing comment gives the DOI). A pub may appear under
# more than one hub (cross-links). See issue #50.
tools:
- name: Skala
  github: microsoft/skala
  blurb: |
    Machine-learned exchange–correlation. [Skala](https://github.com/microsoft/skala)
    learns the exchange–correlation functional of Kohn–Sham DFT directly from data,
    reaching hybrid-functional accuracy at semi-local cost [@Luise25]. The thread runs
    through a variational principle for regularizing machine-learned density
    functionals [@delMazo-SevillanoJCP23] and ties back to wavefunctions via accurate
    real-space electron densities from neural networks [@ChengJCP25], trained and
    benchmarked on dedicated reference datasets [@EhlertSD26; @GasevicJCIM25].
  pubs:
  - Luise25  # 10.48550/arxiv.2506.14665 — accurate and scalable XC with deep learning
  - delMazo-SevillanoJCP23  # 10.1063/5.0166432 — regularizing ML density functionals
  - ChengJCP25  # 10.1063/5.0236919 — real-space densities (also DeepQMC)
  datasets:
  - EhlertSD26  # 10.1038/s41597-026-07200-8 Accurate Chemistry Collection
  - GasevicJCIM25  # 10.1021/acs.jcim.5c01364 "mindless" molecules
- name: DeepQMC
  github: deepqmc/deepqmc
  blurb: |
    Neural-network wavefunctions. [DeepQMC](https://github.com/deepqmc/deepqmc) began with
    PauliNet [@HermannNC20], the first deep-learning *ansatz* to reach chemical accuracy
    through variational Monte Carlo; it converged to the fixed-node limit [@SchatzleJCP21],
    reached excited states [@EntwistleNC23], and grew into a general open-source suite
    [@SchatzleJCP23] (with a review of the field [@HermannNRC23]). The arc now points at a
    foundation model of wavefunctions [@Foster25].
  pubs:
  - HermannNC20  # 10.1038/s41557-020-0544-y — PauliNet
  - Foster25  # 10.48550/arxiv.2506.19960 foundation model of wavefunctions
  - SchatzleJCP23  # 10.1063/5.0157512 — DeepQMC suite
  - SchatzleJCP21  # 10.1063/5.0032836 — fixed-node limit
  - EntwistleNC23  # 10.1038/s41467-022-35534-5 — excited states
  - HermannNRC23  # 10.1038/s41570-023-00516-8 — NN wavefunctions review
  - ChengJCP25  # 10.1063/5.0236919 — real-space densities (also Skala)
- name: libMBD
  github: libmbd/libmbd
  blurb: |
    Many-body dispersion and van der Waals interactions. The itch started with a
    vdW-DF/CCSD(T) correction scheme [@HermannJCP13] for zeolites [@HermannCT14;
    @PolozijCT13] and grew into a unified density-functional model of van der Waals
    interactions [@HermannPRL20] — two theses [@Hermann13; @Hermann18] and a *Chemical
    Reviews* survey [@HermannCR17], with the exchange–correlation balance worked out along
    the way [@HermannJCTC18; @Hermann18a]. Packaged as
    [libMBD](https://github.com/libmbd/libmbd), a scalable many-body dispersion library
    [@HermannJCP23] now embedded in several electronic-structure codes, it underpins
    applications from π–π stacked molecules [@HermannNC17] through molecular crystals and
    layered materials [@LiuJCP16; @ChattopadhyayaCM17; @CuiJPCL20; @OuyangJCTC21] to Casimir
    and fluctuational-electrodynamics phenomena [@VenkataramPRL17; @VenkataramPRL18;
    @VenkataramSA19; @VenkataramPRB20; @StohrNC21].
  pubs:
  - HermannJCP23  # 10.1063/5.0170972 — libMBD package
  - HermannPRL20  # 10.1103/physrevlett.124.146401 — unified vdW functional
  - HermannCR17  # 10.1021/acs.chemrev.6b00446 — Chem Rev survey
  - HermannJCTC18  # 10.1021/acs.jctc.7b01172 — exchange/correlation in vdW
  - Hermann18a  # 10.1007/978-3-319-42913-7_6-1 vdW interactions in material modelling (chapter)
  - HermannJCP13  # 10.1063/1.4813826 — vdW-DF/CCSD(T) origin
  - Hermann18  # 10.18452/18706 — PhD thesis
  - Hermann13  # 20.500.11956/52661 — MSc thesis
  - HermannCT14  # 10.1016/j.cattod.2013.09.016 layered zeolite frameworks (origin)
  - PolozijCT13  # 10.1016/j.cattod.2012.08.025 Friedländer reaction in zeolites (origin)
  - HermannNC17  # 10.1038/ncomms14052 — π–π collective fluctuations
  - LiuJCP16  # 10.1063/1.4972810
  - ChattopadhyayaCM17  # 10.1021/acs.chemmater.6b04190
  - CuiJPCL20  # 10.1021/acs.jpclett.9b03716
  - OuyangJCTC21  # 10.1021/acs.jctc.1c00782
  satellites:   # collapsed "related" — Casimir / fluctuational electrodynamics
  - VenkataramPRL17  # 10.1103/physrevlett.118.266802
  - VenkataramPRL18  # 10.1103/physrevlett.121.045901
  - VenkataramSA19  # 10.1126/sciadv.aaw0456
  - VenkataramPRB20  # 10.1103/physrevb.102.085403
  - StohrNC21  # 10.1038/s41467-020-20473-w

# Own tools with real effort but no research arc behind them, and de-emphasized
# contributor codes, are both derived from the `software` list in data/cv.yaml
# (the single source of truth): a creator entry whose repo is not a hub anchor
# becomes an "other tool", any other non-hub entry a "contributes to" line. Each
# contributor entry may name its program `paper` (a DOI) in that list.

# A fourth, thematic section that folds in the remainder — smaller tools I've
# built, the community codes I contribute to, survey writing, and any talks tied
# to no hub — with a single paragraph tying most of the bits together. Its tool
# lists are derived from the software list, its reviews from `reviews` below, and
# its talks are the ones `unhubbed_talks` collects.
fourth_theme:
  id: more
  name: Codes, tools & writing
  blurb: |
    Beyond the three flagships, the connective tissue. I build smaller standalone
    tools — [Pyberny](https://github.com/jhrmnn/pyberny), a molecular geometry
    optimizer, and [Mona](https://pub.hrmnn.net/ec/8024310f/2018-11-28-fhi-talk.pdf),
    a framework for reproducible computational science — and contribute to the
    community electronic-structure codes the methods above plug into:
    [FHI-aims](https://fhi-aims.org), [PySCF](https://pyscf.org),
    [DFTB+](https://dftbplus.org), and [QCEngine](https://github.com/MolSSI/QCEngine).
    The same breadth runs through survey writing, from a roadmap on machine learning in
    electronic structure [@KulikES22] to an introduction to material modeling [@Hermann20],
    and the assorted invited seminars below.

# Cross-cutting writing that doesn't sit under a single tool (shown in the fourth theme).
reviews:
- KulikES22  # 10.1088/2516-1075/ac572f — roadmap on ML in electronic structure
- Hermann20  # 10.1007/978-3-030-40245-7_2 Introduction to material modeling (chapter)

# Cloudflare Worker that serves the static site (Workers Static Assets) and a
# small single-actor ActivityPub server for hrmnn.net. The Worker is the
# request entry point: it handles /.well-known/webfinger and /ap/* itself and
# falls through to the static assets (the rendered _site/) for everything else.
name = "jhrmnn-site"
main = "worker/index.ts"
compatibility_date = "2025-01-01"

# Workers Static Assets: the render step keeps producing _site/ exactly as
# before. The worker forwards anything it doesn't handle back to the asset server
# via env.ASSETS.fetch(request).
#
# run_worker_first lists the paths where the worker MUST run before the static
# asset server, even when a static file exists at that path. /notes/* is here so
# the worker can content-negotiate a post page: an ActivityPub Accept header
# returns the Note, otherwise it forwards to the static HTML. (Requires wrangler
# v4 for the array form; boolean `true` — worker-first for everything — is the
# fallback.)
[assets]
directory = "./_site"
binding = "ASSETS"
run_worker_first = ["/notes/*", "/ap/*", "/.well-known/webfinger"]

# Non-secret config. The two secrets (AP_PRIVATE_KEY, AP_ADMIN_TOKEN) are NOT
# here — they are set in the Cloudflare dashboard (Settings -> Variables and
# Secrets -> type "Secret") after the first deploy.
[vars]
DOMAIN = "hrmnn.net"
USERNAME = "hrmnn.net"
# The actor's PUBLIC key (SPKI PEM). Not secret — it is published in the actor
# object for any peer to fetch. Paste the contents of ap_public.pem here.
AP_PUBLIC_KEY = """
-----BEGIN PUBLIC KEY-----
REPLACE_WITH_CONTENTS_OF_ap_public.pem
-----END PUBLIC KEY-----
"""

# Follower storage (Notes are static build artifacts, not KV). Create the
# namespace once in the dashboard (or `wrangler kv namespace create FEDI`) and
# paste its id below.
[[kv_namespaces]]
binding = "FEDI"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

{# vim: set ft=jinja sts=2 sw=2: #}
<!doctype html>
<html lang="en" class="no-js">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{{ page_title }}</title>
{% if meta_description %}<meta name="description" content="{{ meta_description }}">{% endif %}

<script type="module">
  document.documentElement.classList.replace('no-js', 'js');
  Array.from(document.getElementsByClassName('article')).forEach((article) => {
    const notice = article.getElementsByClassName('notice')[0];
    if (notice) {
      article.getElementsByClassName('pdf')[0].dataset.tooltip = notice.textContent.trim().slice(1);
      article.removeChild(notice);
      const notice_star = article.getElementsByClassName('notice-star')[0];
      article.removeChild(notice_star);
    }
  });
  // Upgrade YouTube facades to the real player on click. Until then a note
  // carries only the poster image, not YouTube's player JS. The injected iframe
  // uses the cookie-less domain and autoplays since the click is user-initiated.
  document.querySelectorAll('a.youtube').forEach((facade) => {
    facade.addEventListener('click', (e) => {
      e.preventDefault();
      const iframe = document.createElement('iframe');
      iframe.className = 'youtube';
      // autoplay + muted + playsinline so the single facade tap starts the
      // video everywhere: iOS blocks autoplay with sound, but permits it muted,
      // which skips YouTube's own play button (the viewer unmutes if they want
      // sound). playsinline keeps it in the box instead of forcing fullscreen.
      iframe.src = `https://www.youtube-nocookie.com/embed/${facade.dataset.id}?autoplay=1&mute=1&playsinline=1`;
      iframe.title = facade.getAttribute('aria-label') || 'YouTube video';
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
      iframe.referrerPolicy = 'strict-origin-when-cross-origin';
      iframe.allowFullscreen = true;
      facade.replaceWith(iframe);
    });
  });

  const styleEl = document.getElementById('site-styles');
  const toggle = document.getElementById('style-toggle');
  const syncToggle = () => {
    toggle.textContent = styleEl.disabled ? 'enable styles' : 'disable styles';
    toggle.setAttribute('aria-pressed', String(styleEl.disabled));
  };
  syncToggle();
  toggle.addEventListener('click', () => {
    styleEl.disabled = !styleEl.disabled;
    syncToggle();
    try { localStorage.setItem('styles', styleEl.disabled ? 'off' : 'on'); } catch (e) {}
  });
</script>

<style id="site-styles">
  {% include "templates/styles.css" %}
</style>
<script>
  // Apply the persisted toggle state before paint to avoid a flash of styles.
  try { document.getElementById('site-styles').disabled = localStorage.getItem('styles') === 'off'; } catch (e) {}
</script>

<link rel="icon" type="image/png" href="data:image/png;base64,{% include "favicon.png.b64" %}">
<link rel="canonical" href="{{ canonical }}">

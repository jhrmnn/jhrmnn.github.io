name: Build
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
  packages: write
  actions: read
  pull-requests: write
concurrency:
  # Scope to the triggering ref so PR runs and main runs don't cancel each
  # other; a static group would put every run in one bucket and, with
  # cancel-in-progress, let any new run preempt an unrelated one. Same-ref
  # superseding (e.g. a new push to a branch) is still cancelled.
  group: pages-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      docker-tag: ${{ steps.docker-tag.outputs.docker-tag }}
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Maybe restore Docker tag
        uses: actions/cache@v4
        id: cache
        with:
          path: docker-tag
          key: ${{ hashFiles('Dockerfile') }}
      - name: Create Docker tag
        if: "!steps.cache.outputs.cache-hit"
        run: date +'%Y%m%d.${{ github.run_number }}' >docker-tag
      - name: Set Docker tag
        id: docker-tag
        run: echo docker-tag=$(cat docker-tag) >>$GITHUB_OUTPUT
      - uses: docker/login-action@v2
        if: "!steps.cache.outputs.cache-hit"
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v4
        if: "!steps.cache.outputs.cache-hit"
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.docker-tag.outputs.docker-tag }}
  changes:
    # Only PRs and pushes to main carry a diff worth inspecting; schedule and
    # workflow_dispatch fetch unconditionally (see the fetch job's if).
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      fetch: ${{ steps.filter.outputs.fetch }}
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Detect changes to fetch inputs
        id: filter
        run: |
          # The fetch step crawls live sources from these inputs. When a push or
          # PR touches one, run a real fetch so the change is exercised end to
          # end instead of silently reusing the previous run's artifact.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] || ! git rev-parse -q --verify "$base^{commit}" >/dev/null; then
            # No usable base (e.g. main's first commit, force-push): err on the
            # side of running fetch.
            changed="$(git ls-files)"
          else
            changed="$(git diff --name-only "$base" HEAD)"
          fi
          fetch=false
          while IFS= read -r f; do
            case "$f" in
              fetch.py|common.py|reuse_data.py|Makefile|pyproject.toml|poetry.lock|data/*|"assets/_Jan Hermann_ - _Google Scholar_.html")
                fetch=true
                break
                ;;
            esac
          done <<<"$changed"
          echo "Changed files touch fetch inputs: $fetch"
          echo "fetch=$fetch" >>"$GITHUB_OUTPUT"
  fetch:
    runs-on: ubuntu-latest
    needs: [build-image, changes]
    # !cancelled() so a skipped changes job (schedule/dispatch) doesn't skip fetch.
    if: >-
      !cancelled() &&
      needs.build-image.result == 'success' &&
      (github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.fetch == 'true')
    container:
      image: ghcr.io/${{ github.repository }}:${{ needs.build-image.outputs.docker-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Restore Poetry and NLTK cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/nltk_data
          key: poetry-${{ hashFiles('poetry.lock') }}
      - run: poetry install --only main
      - name: Fetch live data
        run: poetry run make fetch
        env:
          PUBLONS_TOKEN: ${{ secrets.PUBLONS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCHOLAR_PROXY: ${{ secrets.SCHOLAR_PROXY }}
      - name: Check derived-data integrity
        # Compares the fresh data against the last published artifact and fails
        # if anything was removed/changed or a growth count dropped. Failing here
        # aborts the job before the upload below, so the bad data isn't published
        # (render needs fetch to succeed). A manual dispatch only logs the
        # problems and carries on, so a known-good refresh can be forced through.
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' }}
        run: poetry run make check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Cross-check Zotero, ORCID and Google Scholar
        # Gate production deploys on the three publication sources agreeing.
        # Runs whenever fetch produces data that will be published: the daily
        # schedule and manual dispatch (both deploy to main), plus a push that
        # changed fetch inputs (fetch already runs, so no extra crawl). The
        # workflow's push trigger is main-only, so checking the event is enough.
        # Not on PRs, which don't deploy and shouldn't be blocked by a mismatch
        # that's the author's to reconcile (e.g. a paper not yet added to ORCID).
        # Failing here aborts before the upload below, so render and the Pages
        # deploy are skipped and inconsistent data isn't published.
        if: >-
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'push'
        run: poetry run make check-sources
      - uses: actions/upload-artifact@v4
        with:
          name: derived
          path: build/derived.json
  render:
    runs-on: ubuntu-latest
    needs: [build-image, fetch]
    if: ${{ !cancelled() && needs.build-image.result == 'success' && needs.fetch.result != 'failure' }}
    container:
      image: ghcr.io/${{ github.repository }}:${{ needs.build-image.outputs.docker-tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Restore fonts and Poetry cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            fonts
            ~/.cache/pypoetry
          key: fonts-${{ hashFiles('poetry.lock') }}
      - name: Get fonts
        if: "!steps.cache.outputs.cache-hit"
        run: wget -nv -O - ${{ secrets.FONTS_URL }} | tar -xzv
      - run: poetry install --only main
      - name: Resolve latest data run
        id: data
        run: |
          run_id=$(poetry run python reuse_data.py --run-id)
          echo "run-id=$run_id" >>"$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Download data
        uses: actions/download-artifact@v4
        with:
          name: derived
          path: build
          run-id: ${{ steps.data.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Render
        run: poetry run make
        env:
          FLAGS: --generated=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      - uses: actions/upload-pages-artifact@v3
      # Loose copy of the rendered site for the Cloudflare preview job;
      # upload-pages-artifact above packs a Pages-only tarball that Wrangler
      # can't consume.
      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site
  deploy-github:
    if: ${{ !cancelled() && needs.render.result == 'success' && github.ref == 'refs/heads/main' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: render
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
  deploy-cloudflare:
    # Per-PR preview on Cloudflare Pages. Production stays on GitHub Pages
    # (deploy-github above); this only ever runs for pull requests, so every
    # deploy lands on a non-production branch and Pages serves it as a preview.
    # Requires a Direct Upload Pages project named below and the repo secrets
    # CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID. Secrets aren't exposed to
    # PRs from forks, so previews only work for same-repo branches.
    if: ${{ !cancelled() && needs.render.result == 'success' && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs: render
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site
          path: _site
      - id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=jhrmnngithubio --branch=${{ github.head_ref }}
      # Post (or update in place) a single PR comment with the preview links,
      # identified by an HTML-comment marker. Uses the official github-script
      # action rather than a third-party one. URLs are passed via env, not
      # string-interpolated into the script, to avoid any injection.
      - uses: actions/github-script@v7
        env:
          ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const marker = '<!-- cloudflare-preview -->';
            const body = [
              marker,
              `Cloudflare Pages preview: ${process.env.ALIAS_URL}`,
              '',
              `Latest commit deploy: ${process.env.DEPLOY_URL}`,
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
